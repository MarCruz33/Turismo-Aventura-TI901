<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Aventura - Login</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">
    <!-- Contenedor principal del login -->
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-box">
                <!-- Logo -->
                <img src="img/logo.png" alt="Logo Turismo Aventura" class="login-logo">

                <h2>Iniciar Sesión</h2>
                <p class="login-subtitle">Accede con tu correo</p>

                <!-- Formulario de Login -->
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">📧 Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tucorreo@turismoaventura.com" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">🔒 Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-login">🚀 Ingresar</button>

                    <!-- Mensaje de error -->
                    <div id="loginError" class="error-message"></div>
                </form>

                <!-- Información de ayuda -->
                <div class="login-help">
                </div>

            </div>
        </div>

        <!-- Footer informativo dentro del wrapper -->
        <footer class="login-footer">
            <p>&copy; 2026 Turismo Aventura - Todos los derechos reservados</p>
        </footer>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
