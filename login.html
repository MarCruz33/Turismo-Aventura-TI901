<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Aventura - Login</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        /* Estilos para el contenedor de la contraseña */
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container input {
            flex: 1;
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            color: #666;
            transition: color 0.3s;
            z-index: 1;
        }

        .toggle-password:hover {
            color: #333;
        }

        .toggle-password:focus {
            outline: none;
        }

        /* Ajuste para que el mensaje de error no se superponga */
        .error-message {
            margin-top: 10px;
            min-height: 24px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="login-page">
    <!-- Contenedor principal del login -->
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-box">
                <!-- Logo -->
                <img src="img/logo.png" alt="Logo Turismo Aventura" class="login-logo">

                <h2>Iniciar Sesión</h2>
                <p class="login-subtitle">Accede con tu correo</p>

                <!-- Formulario de Login -->
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">📧 Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tucorreo@turismoaventura.com" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">🔒 Contraseña</label>
                        <div class="password-container">
                            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                            <button type="button" class="toggle-password" id="togglePassword"
                                aria-label="Mostrar contraseña">
                                👁️
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">🚀 Ingresar</button>

                    <!-- Mensaje de error -->
                    <div id="loginError" class="error-message"></div>
                </form>

                <!-- Información de ayuda -->
                <div class="login-help">
                </div>

            </div>
        </div>

        <!-- Footer informativo dentro del wrapper -->
        <footer class="login-footer">
            <p>&copy; 2026 Turismo Aventura - Todos los derechos reservados</p>
        </footer>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
